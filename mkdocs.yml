site_name: "neuroflow"
site_description: "A plugin for Claude Code and GitHub Copilot CLI — agentic neuroscience research from first hypothesis to manuscript draft."
site_url: "https://stanislavjiricek.github.io/neuroflow/"
repo_url: "https://github.com/stanislavjiricek/neuroflow"
repo_name: "stanislavjiricek/neuroflow"
edit_uri: ""

hooks:
  - docs/hooks.py

exclude_docs: |
  hooks.py
  __pycache__/

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo-full.svg
  favicon: assets/logo-brain.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      tip: octicons/squirrel-16
      warning: octicons/alert-16
      info: octicons/info-16
      example: octicons/beaker-16

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols

extra:
  version: "0.2.14"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stanislavjiricek/neuroflow
      name: neuroflow on GitHub
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mind.js

plugins:
  - search:
      lang: en
  - tags

