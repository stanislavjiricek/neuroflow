{% extends "base.html" %}

{% block announce %}
<div class="nf-announce-inner">
  <span class="nf-announce-text">🌱 <strong>Early pre-release</strong> — neuroflow is community-driven. Shape it: report bugs, suggest ideas, propose structure changes, or contribute code.</span>
  <span class="nf-announce-links">
    <a href="https://github.com/stanislavjiricek/neuroflow/issues/new" class="nf-announce-btn">🐛 Report bug</a>
    <a href="https://github.com/stanislavjiricek/neuroflow/issues/new?template=feature_request.md" class="nf-announce-btn">💡 Suggest idea</a>
    <a href="https://github.com/stanislavjiricek/neuroflow/pulls" class="nf-announce-btn">🔀 Contribute</a>
  </span>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
  document$.subscribe(function () {
    document.querySelectorAll('.nf-header-version').forEach(function (el) { el.remove(); });
    var inner = document.querySelector('.md-header__inner');
    if (!inner) return;
    var badge = document.createElement('span');
    badge.className = 'nf-header-version';
    badge.textContent = 'v{{ config.extra.version }}';
    inner.appendChild(badge);
  });
</script>
{% endblock %}
