name: Research Radar (Weekly)

on:
  schedule:
    - cron: '0 20 * * 5'   # 20:00 UTC every Friday
  workflow_dispatch:

permissions:
  contents: read
  discussions: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install automation dependencies
        run: pip install -r scripts/automation/requirements.txt

      - name: Generate and post research radar brief
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/automation/research_radar.py \
            --repo "${{ github.repository }}" \
            --discussion-number 169
